services:
  api:
    build: .
    container_name: api
    restart: always
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    volumes:
      - ../cohesive-ngsmanager-cli:/cohesive-ngsmanager-cli

  # The HTTPS Server
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
